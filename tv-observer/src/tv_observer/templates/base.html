{% extends "suite_base.html" %}
{% set suite_module = "Observer" %}
{% set suite_purpose = "Inventory and evidence" %}
{% block module_assets %}<link rel="stylesheet" href="{{ url_for('static', filename='app.css') }}"><script defer src="{{ url_for('static', filename='app.js') }}"></script>{% endblock %}
{% block suite_nav %}{% for section in sections %}<a href="{{ url_for('section', name=section.lower().replace(' ', '-')) }}" {% if section == active %}aria-current="page"{% endif %}>{{ section }}</a>{% endfor %}{% endblock %}
